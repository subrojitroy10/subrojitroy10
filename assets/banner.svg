<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10" />
      <stop offset="100%" stop-color="#12161a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="250" fill="url(#bg)" />
  <rect width="900" height="250" fill="url(#grid)" />

  <!-- Subtle abstract network nodes representing architecture -->
  <g stroke="#0d9488" stroke-width="0.5" stroke-opacity="0.2" fill="none">
    <circle cx="800" cy="80" r="4" fill="#0d9488" fill-opacity="0.2" />
    <circle cx="720" cy="140" r="3" fill="#0d9488" fill-opacity="0.1" />
    <circle cx="820" cy="170" r="5" fill="#0d9488" fill-opacity="0.2" />
    <circle cx="680" cy="70" r="2" fill="#0d9488" fill-opacity="0.1" />
    <line x1="800" y1="80" x2="720" y2="140" />
    <line x1="800" y1="80" x2="820" y2="170" />
    <line x1="720" y1="140" x2="820" y2="170" />
    <line x1="680" y1="70" x2="800" y2="80" />
    <line x1="680" y1="70" x2="720" y2="140" />
  </g>

  <!-- Left Accent Bar -->
  <rect x="0" y="0" width="6" height="250" fill="url(#accent)" />

  <!-- Text Content -->
  <text x="60" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji'" font-size="34" font-weight="800" fill="#f8fafc" letter-spacing="1.5">SUBROJIT ROY</text>
  <text x="60" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="3">SYSTEMS ARCHITECT &amp; TECHNICAL FOUNDER</text>
  
  <text x="60" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#0d9488" letter-spacing="1">
    Enterprise Platform Builder  •  AI Platform Engineer  •  Behaviour Intelligence Researcher
  </text>
</svg>
