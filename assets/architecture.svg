<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10" />
      <stop offset="100%" stop-color="#12161a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.02" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" />
  <rect width="900" height="300" fill="url(#grid)" />

  <!-- Title -->
  <text x="30" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="2">CONCEPTUAL PLATFORM ARCHITECTURE</text>

  <!-- Flow Lines -->
  <!-- Box 1 -> Box 2 -->
  <path d="M 210 150 L 250 150" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4,4" />
  <polygon points="250,150 242,146 242,154" fill="#0d9488" />
  
  <!-- Box 2 -> Box 3 -->
  <path d="M 430 150 L 470 150" fill="none" stroke="#0d9488" stroke-width="1.5" />
  <polygon points="470,150 462,146 462,154" fill="#0d9488" />
  
  <!-- Box 3 -> Box 4 -->
  <path d="M 650 150 L 690 150" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4,4" />
  <polygon points="690,150 682,146 682,154" fill="#0d9488" />

  <!-- Box 1: Data Ingestion Grid -->
  <rect x="30" y="80" width="180" height="140" rx="6" fill="#1e293b" fill-opacity="0.2" stroke="#334155" stroke-width="1" />
  <text x="45" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Ingestion Grid</text>
  <text x="45" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Stealth Scraper Nodes</text>
  <text x="45" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Playwright Scraper Engines</text>
  <text x="45" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Signal &amp; Audio Pipelines</text>
  <text x="45" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#0d9488">DATA ACQUISITION</text>

  <!-- Box 2: Cache & Databases -->
  <rect x="250" y="80" width="180" height="140" rx="6" fill="#1e293b" fill-opacity="0.2" stroke="#334155" stroke-width="1" />
  <text x="265" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Storage &amp; Caching</text>
  <text x="265" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• PostgreSQL Database</text>
  <text x="265" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• PL/pgSQL Optimization</text>
  <text x="265" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Redis Memory Cache</text>
  <text x="265" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#0d9488">DATA STATE LAYER</text>

  <!-- Box 3: API & Core Engine -->
  <rect x="470" y="80" width="180" height="140" rx="6" fill="#1e293b" fill-opacity="0.2" stroke="#0d9488" stroke-width="1" />
  <text x="485" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Core Engines &amp; APIs</text>
  <text x="485" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• FastAPI Async Services</text>
  <text x="485" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• ML Signal Classifiers</text>
  <text x="485" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• NumPy, SciPy Pipelines</text>
  <text x="485" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#0d9488">INTELLIGENCE FRAMEWORK</text>

  <!-- Box 4: Enterprise Operating Platform -->
  <rect x="690" y="80" width="180" height="140" rx="6" fill="#1e293b" fill-opacity="0.2" stroke="#334155" stroke-width="1" />
  <text x="705" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Modular Platform</text>
  <text x="705" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Modular Business Engines</text>
  <text x="705" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Shared Platform Services</text>
  <text x="705" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">• Platform Extensibility</text>
  <text x="705" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#0d9488">OPERATING PLATFORM</text>
</svg>
